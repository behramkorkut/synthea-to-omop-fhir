# A HAPI FHIR JPA server (reference FHIR R4 server) for local interoperability.
# Start:  make fhir-server   (or: docker compose -f docker/hapi-fhir.yml up -d)
# Base URL:  http://localhost:8080/fhir   ·   UI: http://localhost:8080/
services:
  hapi-fhir:
    image: hapiproject/hapi:latest
    container_name: sof-hapi-fhir
    ports:
      - "8080:8080"
    environment:
      # Serve FHIR R4 (matches the R4B resources we export).
      hapi.fhir.fhir_version: R4
    networks:
      - sof-net

networks:
  sof-net:
    driver: bridge

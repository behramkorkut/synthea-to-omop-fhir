name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install the project
        run: uv sync

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Tests (pytest)
        # Integration tests skip without a built warehouse; unit tests run.
        run: uv run pytest

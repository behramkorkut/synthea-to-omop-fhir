# Production stack: PostgreSQL + API + HAPI FHIR + nginx reverse proxy
# Usage: docker compose -f docker-compose.prod.yml up --build
#
# Prerequisites:
#   - Build OMOP warehouse locally (make bronze && make omop) OR run dbt inside container
#   - Set API_KEY, POSTGRES_DSN, and other secrets in .env.prod

services:
  db:
    image: postgres:16-alpine
    container_name: sof-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-omop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-omop}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-omop}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sof-net

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: synthea-omop-fhir
    container_name: sof-api
    command: ["api"]
    ports:
      - "8000:8000"
    environment:
      DB_ENGINE: postgres
      POSTGRES_DSN: ${POSTGRES_DSN}
      API_KEY: ${API_KEY}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-60}
      LOG_FORMAT: json
      LOG_LEVEL: INFO
    depends_on:
      db:
        condition: service_healthy
      hapi-fhir:
        condition: service_started
    networks:
      - sof-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  dashboard:
    image: synthea-omop-fhir
    container_name: sof-dashboard
    command: ["dashboard"]
    ports:
      - "8501:8501"
    environment:
      DB_ENGINE: postgres
      POSTGRES_DSN: ${POSTGRES_DSN}
      API_KEY: ${API_KEY}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sof-net

  hapi-fhir:
    image: hapiproject/hapi:latest
    container_name: sof-hapi-fhir
    ports:
      - "8080:8080"
    environment:
      hapi.fhir.fhir_version: R4
    networks:
      - sof-net

  nginx:
    image: nginx:alpine
    container_name: sof-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - sof-net

volumes:
  postgres_data:

networks:
  sof-net:
    driver: bridge
